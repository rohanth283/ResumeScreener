version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-screener-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - ./backend/app.db:/app/app.db
      - ./backend/sent_emails.log:/app/sent_emails.log
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-screener-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
